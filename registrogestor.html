<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro de Gestor Inmobiliario Free - PNK Inmobiliaria</title>
    <link rel="icon" href="img/iconoPNK.png">
    <link href="css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <img src="img/LogoPNK2.png" alt="Logo PNK" style="height:120px;">
        </div>
    </header>

    <section class="container my-5">
        <h2 class="mb-4 text-center">Formulario de Registro para Gestor Inmobiliario Free</h2>
        <form class="row g-3">

            <div class="col-md-6">
                <label for="nombre" class="form-label fw-bold">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="rut" class="form-label fw-bold">RUT</label>
                <input type="text" id="rut" name="rut" class="form-control" placeholder="12.345.678-9" required>
            </div>

            <div class="col-md-6">
                <label for="email" class="form-label fw-bold">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="fechaNacimiento" class="form-label fw-bold">Fecha de nacimiento</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="telefono" class="form-label fw-bold">Teléfono móvil</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="sexo" class="form-label fw-bold">Sexo</label>
                <select id="sexo" name="sexo" class="form-select" required>
                <option value="">Seleccione...</option>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Otro</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label for="confirmPassword" class="form-label fw-bold">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
            </div>

            <div class="col-md-12">
                <label for="certificado" class="form-label fw-bold">Certificado de Antecedentes</label>
                <input type="file" id="certificado" name="certificado" class="form-control" accept=".pdf" required>
                <small class="text-muted">Adjunte su certificado en formato PDF.</small>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-warning text-dark fw-bold">Registrarme</button>
                <a href="index.html"><button type="button" class="btn btn-outline-dark fw-bold">Cancelar</button></a>
            </div>
        </form>
    </section>

<footer class="text-white py-3 mt-5">
    <div class="container text-center">
        <p class="mb-0">© 2026 PNK Inmobiliaria - Región de Coquimbo</p>
    </div>
</footer>

    <script src="js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
